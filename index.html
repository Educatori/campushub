<!DOCTYPE html>
<html lang="it">

<meta charset="UTF-8">

<style>
/* ─── INDEX-SPECIFIC ─────────────────────────────────────────── */
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background: var(--bg);
    background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,142,247,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(56,217,169,0.07), transparent);
}

/* Header */
.header-container {
    text-align: center;
    margin-bottom: 48px;
}

h1 {
    font-size: 2rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
}

#todayDate {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-2);
    margin-bottom: 6px;
    font-family: var(--font-mono);
}

#digitalClock {
    font-size: 2.4rem;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: 0.05em;
    text-shadow: 0 0 30px rgba(79,142,247,0.45);
    margin-bottom: 0;
}

/* Grid */
.links-grid {
    display: grid;
    grid-template-columns: repeat(3, 145px);
    gap: 18px;
}

/* Card */
.link-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    height: 145px;
    width: 145px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    transition: all 0.35s cubic-bezier(.25,.8,.25,1);
    position: relative;
    overflow: hidden;
}

/* Shimmer effect */
.link-card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(79,142,247,0.08), transparent);
    transform: rotate(25deg);
    top: -100%;
    left: -100%;
    transition: 0.6s;
}

.link-card:hover::before { top: 100%; left: 100%; }

/* Accent border bottom */
.link-card::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 10%;
    width: 80%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
}

.link-card:hover::after { opacity: 1; }

.link-card svg {
    width: 38px;
    height: 38px;
    stroke: var(--accent);
    stroke-width: 1.6;
    fill: none;
    transition: all 0.3s;
    filter: drop-shadow(0 0 8px rgba(79,142,247,0.3));
}

.link-card span {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
}

.link-card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow: var(--shadow-lg);
    border-color: var(--border-2);
    background: var(--surface-2);
}

.link-card:hover svg {
    stroke: var(--accent-2);
    filter: drop-shadow(0 0 12px rgba(56,217,169,0.45));
}

.link-card:hover span { color: var(--text); }

.link-card:active { transform: scale(0.97); }

@media (max-width: 520px) {
    .links-grid { grid-template-columns: repeat(2, 145px); }
    h1 { font-size: 1.4rem; }
    #digitalClock { font-size: 1.8rem; }
}

/* ─── LIGHT MODE (mobile con sistema chiaro) ────────────────── */
@media (max-width: 768px) and (prefers-color-scheme: light) {
    body {
        background: var(--bg);
        background-image:
            radial-gradient(ellipse 80% 50% at 50% -10%, rgba(37,99,235,0.08), transparent),
            radial-gradient(ellipse 60% 40% at 80% 110%, rgba(13,148,136,0.05), transparent);
    }
    h1 {
        background: linear-gradient(90deg, var(--header-grad-start), var(--header-grad-end));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #digitalClock { color: var(--accent); text-shadow: 0 0 20px rgba(37,99,235,0.25); }
    .link-card { background: var(--surface); border-color: var(--border); box-shadow: var(--shadow-sm); }
    .link-card svg { stroke: var(--accent); filter: none; }
    .link-card span { color: var(--text-2); }
    .link-card:hover { background: var(--surface-2); border-color: var(--border-2); box-shadow: var(--shadow); }
    .link-card:hover svg { stroke: var(--accent-2); filter: none; }
    .link-card:hover span { color: var(--text); }
}
</style>
</head>

<script>
function updateDateTime() {
    const now = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('todayDate').textContent = now.toLocaleDateString('it-IT', options);
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('digitalClock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateDateTime, 1000);
updateDateTime();
</script>
